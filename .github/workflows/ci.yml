name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/base-poc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Vendor Solidity deps (lib/ is gitignored; pinned to the versions used locally)
        run: |
          git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          git clone --depth 1 --branch v5.1.0 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          git clone --depth 1 --branch v0.7.0 https://github.com/eth-infinitism/account-abstraction.git lib/account-abstraction
      - name: forge test
        run: forge test -vv
      - name: EIP-170 and initcode size gate
        run: forge build --skip test && node ../../scripts/verify-base-runtime-size.mjs
