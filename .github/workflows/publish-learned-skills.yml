name: Publish learned skills

# Daily "publish learned skills" loop: syncs authored skills staged in
# published-skills/ into dirtybits/agent-skills and ensures every skill carries
# an MIT LICENSE, then opens (or updates) a pull request on the target repo.
#
# Setup (one-time): add a repo secret AGENT_SKILLS_TOKEN — a fine-grained PAT or
# classic token with contents + pull-request write access to the target repo.
# See docs/SKILL_PUBLISHING_LOOP.md.

on:
  schedule:
    # 07:13 UTC daily — deliberately off the :00 mark to avoid the cron rush.
    - cron: "13 7 * * *"
  workflow_dispatch:
    inputs:
      target_repo:
        description: "owner/repo to publish into"
        default: "dirtybits/agent-skills"
        required: false
      apply:
        description: "Write changes and open a PR (false = dry-run log only)"
        type: boolean
        default: true
      license_only:
        description: "Only stamp MIT LICENSE onto existing target skills"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-learned-skills
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: ${{ github.event.inputs.target_repo || 'dirtybits/agent-skills' }}
      APPLY: ${{ github.event.inputs.apply != 'false' }}
      LICENSE_ONLY: ${{ github.event.inputs.license_only == 'true' }}
      BRANCH: bot/publish-learned-skills
    steps:
      - name: Checkout agentvouch (source of staged skills)
        uses: actions/checkout@v4

      - name: Check for publish token
        id: token
        run: |
          if [ -n "${{ secrets.AGENT_SKILLS_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AGENT_SKILLS_TOKEN secret is not set; running dry-run only and skipping the PR. See docs/SKILL_PUBLISHING_LOOP.md."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Checkout target skills repo
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.AGENT_SKILLS_TOKEN }}
          path: agent-skills
          fetch-depth: 0

      - name: Dry-run (no token) — log pending changes only
        if: steps.token.outputs.present == 'false'
        run: |
          # Without the target checkout we can only validate the script parses
          # and report what it would do against an empty stand-in.
          mkdir -p /tmp/agent-skills/skills
          node scripts/publish-learned-skills.mjs --agent-skills /tmp/agent-skills || true

      - name: Sync skills + MIT licenses
        if: steps.token.outputs.present == 'true'
        run: |
          ARGS="--agent-skills agent-skills --apply"
          if [ "${APPLY}" != "true" ]; then ARGS="--agent-skills agent-skills"; fi
          if [ "${LICENSE_ONLY}" = "true" ]; then ARGS="$ARGS --license-only"; fi
          echo "running: node scripts/publish-learned-skills.mjs $ARGS"
          node scripts/publish-learned-skills.mjs $ARGS

      - name: Open or update pull request
        if: steps.token.outputs.present == 'true' && env.APPLY == 'true'
        working-directory: agent-skills
        env:
          GH_TOKEN: ${{ secrets.AGENT_SKILLS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to publish — target is up to date."
            exit 0
          fi
          git config user.name "agentvouch-bot"
          git config user.email "bot@agentvouch.xyz"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "Publish learned skills + MIT licenses ($(date -u +%Y-%m-%d))"
          git push --force-with-lease origin "$BRANCH"
          # Open a PR if one is not already open for this branch.
          if ! gh pr view "$BRANCH" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            gh pr create \
              --repo "$TARGET_REPO" \
              --base main \
              --head "$BRANCH" \
              --title "Publish learned skills + MIT licenses" \
              --body "Automated daily sync from dirtybits/agentvouch \`published-skills/\`. Adds/updates authored skills and ensures every skill ships an MIT LICENSE. Generated by .github/workflows/publish-learned-skills.yml."
          else
            echo "PR for $BRANCH already open; pushed update."
          fi
