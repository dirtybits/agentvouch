[toolchain]
package_manager = "npm"
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
agentvouch = "AGNtBjLEHFnssPzQjZJnnqiaUgtkaxj4fFaWoKD6yVdg"

[programs.devnet]
agentvouch = "AGNtBjLEHFnssPzQjZJnnqiaUgtkaxj4fFaWoKD6yVdg"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
init-agentvouch-config = "npm exec ts-node -- scripts/init-agentvouch-config.ts"
test = "npm exec ts-mocha -- -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
