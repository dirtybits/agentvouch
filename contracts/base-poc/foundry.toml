[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
bytecode_hash = "none"
cbor_metadata = false
extra_output = ["storageLayout"]
# Keep the POC isolated; it must never pull in or disturb the Solana workspaces.
