# AgentVouch <> Kora spike (devnet)
# Goal: prove Kora can act as fee payer for AgentVouch purchase_skill txs,
# quote the fee in USDC via Margin pricing (replacing the static SOL/USDC env),
# and reject anything outside the AgentVouch allowlist.

[validation]
max_allowed_lamports = 10000000       # ~0.01 SOL drain cap/tx (tune to just above real purchase rent+fee)
max_signatures = 10
price_source = "Mock"                 # "Mock" for devnet; "Jupiter" for live mainnet pricing

# Only AgentVouch + the programs its instructions touch may appear in a sponsored tx.
allowed_programs = [
  "AGNtBjLEHFnssPzQjZJnnqiaUgtkaxj4fFaWoKD6yVdg",   # AgentVouch v0.2.0 (devnet)
  "11111111111111111111111111111111",              # System
  "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",    # SPL Token
  "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",   # Associated Token
  "ComputeBudget111111111111111111111111111111",    # Compute Budget
]

# Buyer reimburses the sponsor in devnet USDC.
allowed_tokens = ["4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"]
allowed_spl_paid_tokens = ["4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"]
disallowed_accounts = []

# Margin pricing: user pays live network cost + 10%. This is the replacement
# for the static AGENTVOUCH_SPONSOR_SOL_USDC_MICRO_PRICE env.
[validation.price]
type = "margin"
margin = 0.1

# CLOSED (2026-06-23): Kora validates RESOLVED instructions (outer + CPI inner, resolved via
# simulation) at signTransaction time. purchase_skill creates the Purchase PDA + ATAs via CPI'd
# CreateAccount with the sponsor as rent payer, so WITHOUT the line below signTransaction rejects
# with: "Fee payer cannot be used for 'System Create Account'". Proven by sign-create-account-test.cjs.
# Everything else stays false (anti-drain): the sponsor still can't be a transfer/burn/close/assign source.
[validation.fee_payer_policy]
system.allow_create_account = true

[kora]
rate_limit = 100
