# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "agentvouch"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is not set}"

PRIMARY="${HOME}/Repos/agentvouch"

git config user.name "dirtybits"
git config user.email "dirtybitsofficial@gmail.com"

# Reuse the warm dependency install from the primary checkout.
# Codex worktrees can otherwise get partial/stale node_modules.
if [ -d "$PRIMARY/node_modules" ] && [ -d "$PRIMARY/web/node_modules" ]; then
  rm -rf node_modules web/node_modules
  ln -s "$PRIMARY/node_modules" node_modules
  ln -s "$PRIMARY/web/node_modules" web/node_modules
else
  npm ci
fi

# Copy local web env when available; it is gitignored in the worktree.
if [ -f "$PRIMARY/web/.env.local" ] && [ ! -f web/.env.local ]; then
  cp "$PRIMARY/web/.env.local" web/.env.local
  chmod 600 web/.env.local || true
fi

# These are per-worktree artifacts. Do not share stale Next/typecheck state.
rm -rf web/.next
rm -f web/tsconfig.tsbuildinfo

# Keep CLI dist available when we reused node_modules instead of npm ci/postinstall.
npm run build:cli

echo "AgentVouch Codex worktree ready: $CODEX_WORKTREE_PATH"
'''
